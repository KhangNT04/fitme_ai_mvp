# Render Blueprint — FitMe AI backend (free tier)
# Docs: https://render.com/docs/blueprint-spec
# After deploy, set CORS_ORIGINS to your Vercel URL in the dashboard.

services:
  - type: web
    name: fitme-api
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://fitme-ai-mvp.vercel.app
      - key: FITME_SEED_ENABLED
        value: "false"
      - key: FITME_SEED_FASHION_REFRESH
        value: "true"
      - key: FITME_SEED_PASSWORD
        value: fitme123
      - key: UPLOAD_DIR
        value: /tmp/uploads
      # Brand billing — mock=true: test cloud không cần PayOS key.
      # PayOS thật: đổi PAYOS_MOCK=false trong Render dashboard + set 3 key bên dưới, rồi redeploy.
      - key: PAYOS_MOCK
        value: "true"
      - key: PAYOS_RETURN_URL
        value: https://fitme-ai-mvp.vercel.app/brand/billing/return?status=success
      - key: PAYOS_CANCEL_URL
        value: https://fitme-ai-mvp.vercel.app/brand/billing/return?status=cancel
      # Khi bật PayOS thật: PAYOS_MOCK=false + set 3 key dưới trong Render dashboard (sync: false)
      - key: PAYOS_CLIENT_ID
        sync: false
      - key: PAYOS_API_KEY
        sync: false
      - key: PAYOS_CHECKSUM_KEY
        sync: false
      # AI VTON — set FITME_AI_MODE=hf + AI_VTON_URL when ai-vton service is deployed
      - key: FITME_AI_MODE
        value: mock
      - key: AI_VTON_URL
        sync: false
      - key: FITME_PUBLIC_BASE_URL
        sync: false
      # AI Stylist — set FITME_AI_STYLIST_MODE=gemini + GEMINI_API_KEY in dashboard
      - key: FITME_AI_STYLIST_MODE
        value: rule
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
