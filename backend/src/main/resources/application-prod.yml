fitme:
  seed:
    enabled: false
    fashion-catalog-refresh: true
    top-up-enabled: true
  test:
    expose-reset-tokens: false
  ai:
    public-base-url: ${FITME_PUBLIC_BASE_URL:https://fitme-ai-mvp.onrender.com}
  frontend:
    base-url: ${FITME_FRONTEND_BASE_URL:https://fitme-ai-mvp.vercel.app}

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
