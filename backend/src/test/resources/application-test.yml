spring:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

fitme:
  jwt:
    secret: test-secret-min-256-bits-long-for-jwt-signing-key-here
    access-expiration: 3600000
    refresh-expiration: 604800000
  cors:
    origins: http://localhost:3000
  upload:
    dir: ./target/test-uploads
  privacy:
    version: "2026-01"
  exception:
    expose-details: true
  test:
    expose-reset-tokens: true
  payos:
    mock: true
  ai:
    mode: mock
    vton-base-url: http://localhost:8001
    public-base-url: http://localhost:8080
    stylist-mode: rule

logging:
  level:
    com.fitme: WARN
    org.testcontainers: INFO
