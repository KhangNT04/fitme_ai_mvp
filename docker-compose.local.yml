# FitMe AI — Local pre-deploy stack (AI features + full app)
# Usage: .\scripts\dev-local.ps1
# Env:   .env.local (copy from .env.local.example)

services:
  postgres:
    image: postgres:16-alpine
    container_name: fitme-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fitme}
      POSTGRES_USER: ${POSTGRES_USER:-fitme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fitme123}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fitme} -d ${POSTGRES_DB:-fitme}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fitme-local

  ai-vton:
    build:
      context: ./ai-services/vton
      dockerfile: Dockerfile
    container_name: fitme-local-ai-vton
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      AI_MODE: ${FITME_AI_MODE:-mock}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_SPACE: ${HF_SPACE:-yisol/IDM-VTON}
    networks:
      - fitme-local

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fitme-local-backend
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    env_file:
      - .env.local
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-fitme}
      DB_USERNAME: ${POSTGRES_USER:-fitme}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-fitme123}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.local}
      CORS_ORIGINS: ${PUBLIC_APP_URL:-http://localhost:3000}
      UPLOAD_DIR: /app/uploads
      FITME_SEED_ENABLED: ${FITME_SEED_ENABLED:-true}
      FITME_SEED_FASHION_REFRESH: ${FITME_SEED_FASHION_REFRESH:-true}
      FITME_SEED_PASSWORD: ${FITME_SEED_PASSWORD:-fitme123}
      PAYOS_MOCK: ${PAYOS_MOCK:-true}
      PAYOS_RETURN_URL: ${PAYOS_RETURN_URL:-http://localhost:3000/brand/billing/return?status=success}
      PAYOS_CANCEL_URL: ${PAYOS_CANCEL_URL:-http://localhost:3000/brand/billing/return?status=cancel}
      FITME_AI_MODE: ${FITME_AI_MODE:-mock}
      AI_VTON_URL: http://ai-vton:8001
      FITME_PUBLIC_BASE_URL: http://localhost:${API_PORT:-8080}
      FITME_AI_STYLIST_MODE: ${FITME_AI_STYLIST_MODE:-rule}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_CANDIDATE_LIMIT: ${GEMINI_CANDIDATE_LIMIT:-30}
      GEMINI_TIMEOUT_MS: ${GEMINI_TIMEOUT_MS:-15000}
    volumes:
      - backend_local_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      ai-vton:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    networks:
      - fitme-local

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
        BACKEND_INTERNAL_URL: http://backend:8080
    container_name: fitme-local-frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.local}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fitme-local

volumes:
  postgres_local_data:
  backend_local_uploads:

networks:
  fitme-local:
    driver: bridge
