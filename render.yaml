# Render Blueprint — FitMe AI backend (free tier)
# Docs: https://render.com/docs/blueprint-spec
# After deploy, set CORS_ORIGINS to your Vercel URL in the dashboard.

services:
  - type: web
    name: fitme-api
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://fitme-ai-mvp.vercel.app
      - key: FITME_FRONTEND_BASE_URL
        value: https://fitme-ai-mvp.vercel.app
      - key: FITME_SEED_ENABLED
        value: "false"
      - key: FITME_SEED_FASHION_REFRESH
        value: "true"
      - key: FITME_SEED_PASSWORD
        value: fitme123
      - key: UPLOAD_DIR
        value: /tmp/uploads
      # Brand billing — mock=true: test cloud không cần PayOS key.
      # PayOS thật: đổi PAYOS_MOCK=false trong Render dashboard + set 3 key bên dưới, rồi redeploy.
      - key: PAYOS_MOCK
        value: "true"
      - key: PAYOS_RETURN_URL
        value: https://fitme-ai-mvp.vercel.app/brand/billing/return?status=success
      - key: PAYOS_CANCEL_URL
        value: https://fitme-ai-mvp.vercel.app/brand/billing/return?status=cancel
      # Khi bật PayOS thật: PAYOS_MOCK=false + set 3 key dưới trong Render dashboard (sync: false)
      - key: PAYOS_CLIENT_ID
        sync: false
      - key: PAYOS_API_KEY
        sync: false
      - key: PAYOS_CHECKSUM_KEY
        sync: false
      # AI VTON — production: FITME_AI_MODE=hf + AI_VTON_URL + FITME_PUBLIC_BASE_URL
      - key: FITME_AI_MODE
        value: hf
      - key: AI_VTON_URL
        value: https://fitme-ai-vton.onrender.com
      - key: FITME_PUBLIC_BASE_URL
        sync: false
      # AI Stylist — set GEMINI_API_KEY in dashboard (required for Gemini)
      - key: FITME_AI_STYLIST_MODE
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: GEMINI_TIMEOUT_MS
        value: "25000"
      # Cloudflare R2 — required for USER_PHOTO VTON on Render (public image URLs)
      - key: FITME_STORAGE_MODE
        value: r2
      - key: R2_ENDPOINT
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false

  - type: web
    name: fitme-ai-vton
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ai-services/vton/Dockerfile
    dockerContext: ai-services/vton
    healthCheckPath: /health
    envVars:
      - key: AI_MODE
        value: hf
      - key: HF_TOKEN
        sync: false
      - key: HF_SPACE
        value: yisol/IDM-VTON
      - key: HF_MAX_RETRIES
        value: "2"
      - key: HF_FALLBACK_COMPOSITE
        value: "true"
      - key: VTON_PUBLIC_BASE_URL
        value: https://fitme-ai-vton.onrender.com
