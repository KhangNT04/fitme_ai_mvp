name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run Maven tests
        working-directory: backend
        run: mvn test -B

  frontend-unit:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Vitest
        working-directory: frontend
        run: npm test

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    needs: frontend-unit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: /api/v1
        run: npm run build

  e2e:
    name: E2E (smoke + role flows)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fitme
          POSTGRES_USER: fitme
          POSTGRES_PASSWORD: fitme123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fitme -d fitme"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Start backend
        working-directory: backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/fitme
          DB_USERNAME: fitme
          DB_PASSWORD: fitme123
          JWT_SECRET: ci-jwt-secret-min-256-bits-long-for-testing-only
          CORS_ORIGINS: http://localhost:3000
          FITME_SEED_ENABLED: "true"
        run: |
          mvn spring-boot:run -q &
          echo $! > ../backend.pid
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/actuator/health >/dev/null 2>&1; then
              echo "Backend ready"
              exit 0
            fi
            if curl -sf http://localhost:8080/api/v1/products >/dev/null 2>&1; then
              echo "Backend ready (products fallback)"
              exit 0
            fi
            sleep 5
          done
          echo "Backend failed to start"
          exit 1

      - name: Run E2E tests
        working-directory: frontend
        env:
          PLAYWRIGHT_START_SERVER: "1"
          CI: "true"
          JWT_SECRET: ci-jwt-secret-min-256-bits-long-for-testing-only
        run: |
          npx playwright test e2e/smoke-routes.spec.ts e2e/role-flows.spec.ts --workers=1 --retries=2
          npx playwright test e2e/rbac.spec.ts --workers=1 --retries=2
          npx playwright test e2e/mobile-nav.spec.ts --project=mobile-chrome --workers=1 --retries=2

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend.pid ]; then kill "$(cat backend.pid)" 2>/dev/null || true; fi
