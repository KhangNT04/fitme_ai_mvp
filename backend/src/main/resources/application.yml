spring:
  application:
    name: fitme-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fitme}
    username: ${DB_USERNAME:fitme}
    password: ${DB_PASSWORD:fitme123}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: ${SERVER_PORT:8080}

fitme:
  jwt:
    secret: ${JWT_SECRET:fitme-dev-secret-change-in-production-min-256-bits-long-key-here}
    access-expiration: ${JWT_ACCESS_EXPIRATION:3600000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  cors:
    origins: ${CORS_ORIGINS:http://localhost:3000}
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  privacy:
    version: "2026-01"
  exception:
    expose-details: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.fitme: INFO
