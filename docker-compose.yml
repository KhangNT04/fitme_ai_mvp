services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fitme}
      POSTGRES_USER: ${POSTGRES_USER:-fitme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fitme123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitme -d fitme"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/fitme
      DB_USERNAME: ${POSTGRES_USER:-fitme}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-fitme123}
      JWT_SECRET: ${JWT_SECRET:-fitme-dev-secret-change-in-production-min-256-bits-long-key-here}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      UPLOAD_DIR: /app/uploads
      FITME_SEED_ENABLED: ${FITME_SEED_ENABLED:-true}
      FITME_SEED_FASHION_REFRESH: ${FITME_SEED_FASHION_REFRESH:-true}
      PAYOS_MOCK: ${PAYOS_MOCK:-true}
      PAYOS_CLIENT_ID: ${PAYOS_CLIENT_ID:-}
      PAYOS_API_KEY: ${PAYOS_API_KEY:-}
      PAYOS_CHECKSUM_KEY: ${PAYOS_CHECKSUM_KEY:-}
      PAYOS_RETURN_URL: ${PAYOS_RETURN_URL:-http://localhost:3000/brand/billing/return?status=success}
      PAYOS_CANCEL_URL: ${PAYOS_CANCEL_URL:-http://localhost:3000/brand/billing/return?status=cancel}
      FITME_AI_MODE: ${FITME_AI_MODE:-mock}
      AI_VTON_URL: http://ai-vton:8001
      FITME_PUBLIC_BASE_URL: http://localhost:8080
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  ai-vton:
    profiles: ["ai"]
    build:
      context: ./ai-services/vton
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      AI_MODE: ${FITME_AI_MODE:-mock}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_SPACE: ${HF_SPACE:-yisol/IDM-VTON}
      HF_MAX_RETRIES: ${HF_MAX_RETRIES:-2}
      HF_FALLBACK_COMPOSITE: ${HF_FALLBACK_COMPOSITE:-true}
      VTON_PUBLIC_BASE_URL: ${VTON_PUBLIC_BASE_URL:-http://localhost:8001}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
        BACKEND_INTERNAL_URL: http://backend:8080
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
