spring:
  application:
    name: fitme-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fitme}
    username: ${DB_USERNAME:fitme}
    password: ${DB_PASSWORD:fitme123}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: ${PORT:${SERVER_PORT:8080}}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

fitme:
  jwt:
    secret: ${JWT_SECRET:fitme-dev-secret-change-in-production-min-256-bits-long-key-here}
    access-expiration: ${JWT_ACCESS_EXPIRATION:3600000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  cors:
    origins: ${CORS_ORIGINS:http://localhost:3000}
  frontend:
    base-url: ${FITME_FRONTEND_BASE_URL:}
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  seed:
    enabled: ${FITME_SEED_ENABLED:true}
    password: ${FITME_SEED_PASSWORD:fitme123}
    top-up-enabled: ${FITME_SEED_TOP_UP:true}
    products-per-brand: ${FITME_SEED_PRODUCTS_PER_BRAND:18}
    min-active-products: ${FITME_SEED_MIN_ACTIVE_PRODUCTS:36}
    fashion-catalog-refresh: ${FITME_SEED_FASHION_REFRESH:true}
  privacy:
    version: "2026-01"
  exception:
    expose-details: false
  test:
    expose-reset-tokens: ${FITME_TEST_EXPOSE_RESET_TOKENS:false}
  payos:
    mock: ${PAYOS_MOCK:true}
    client-id: ${PAYOS_CLIENT_ID:}
    api-key: ${PAYOS_API_KEY:}
    checksum-key: ${PAYOS_CHECKSUM_KEY:}
    return-url: ${PAYOS_RETURN_URL:http://localhost:3000/brand/billing/return?status=success}
    cancel-url: ${PAYOS_CANCEL_URL:http://localhost:3000/brand/billing/return?status=cancel}
  ai:
    mode: ${FITME_AI_MODE:mock}
    vton-base-url: ${AI_VTON_URL:http://localhost:8001}
    embeddings-base-url: ${AI_EMBEDDINGS_URL:http://localhost:8102}
    public-base-url: ${FITME_PUBLIC_BASE_URL:http://localhost:8080}
    poll-interval-ms: ${FITME_AI_POLL_INTERVAL_MS:3000}
    job-timeout-seconds: ${FITME_AI_JOB_TIMEOUT_SECONDS:120}
    stylist-mode: ${FITME_AI_STYLIST_MODE:rule}
    gemini-api-key: ${GEMINI_API_KEY:}
    gemini-model: ${GEMINI_MODEL:gemini-2.0-flash}
    stylist-candidate-limit: ${GEMINI_CANDIDATE_LIMIT:30}
    stylist-timeout-ms: ${GEMINI_TIMEOUT_MS:15000}
  storage:
    mode: ${FITME_STORAGE_MODE:local}
    r2:
      endpoint: ${R2_ENDPOINT:}
      bucket: ${R2_BUCKET:}
      access-key-id: ${R2_ACCESS_KEY_ID:}
      secret-access-key: ${R2_SECRET_ACCESS_KEY:}
      public-base-url: ${R2_PUBLIC_BASE_URL:}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when_authorized
  health:
    show-details: when_authorized

logging:
  level:
    com.fitme: INFO
