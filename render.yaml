# Render Blueprint — FitMe AI backend (free tier)
# Docs: https://render.com/docs/blueprint-spec
# After deploy, set CORS_ORIGINS to your Vercel URL in the dashboard.

services:
  - type: web
    name: fitme-api
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: FITME_SEED_ENABLED
        value: "false"
      - key: FITME_SEED_PASSWORD
        value: fitme123
      - key: UPLOAD_DIR
        value: /tmp/uploads
