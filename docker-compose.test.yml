# FitMe AI — Test / staging deploy (single server, Docker Compose)
# Usage: cp .env.test.example .env.test && docker compose --env-file .env.test -f docker-compose.test.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: fitme-test-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fitme}
      POSTGRES_USER: ${POSTGRES_USER:-fitme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.test}
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fitme} -d ${POSTGRES_DB:-fitme}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fitme-test

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fitme-test-backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-fitme}
      DB_USERNAME: ${POSTGRES_USER:-fitme}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.test}
      CORS_ORIGINS: ${PUBLIC_APP_URL:?Set PUBLIC_APP_URL in .env.test}
      UPLOAD_DIR: /app/uploads
      FITME_SEED_ENABLED: ${FITME_SEED_ENABLED:-true}
    volumes:
      - backend_test_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fitme-test

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
        BACKEND_INTERNAL_URL: http://backend:8080
    container_name: fitme-test-frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - fitme-test

  backend-proxy:
    image: nginx:alpine
    container_name: fitme-test-api-proxy
    restart: unless-stopped
    profiles:
      - debug-api
    ports:
      - "${API_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx-api.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - fitme-test

volumes:
  postgres_test_data:
  backend_test_uploads:

networks:
  fitme-test:
    driver: bridge
