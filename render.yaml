# Render Blueprint — FitMe AI backend (free tier)
# Docs: https://render.com/docs/blueprint-spec
# After deploy, set CORS_ORIGINS to your Vercel URL in the dashboard.

services:
  - type: web
    name: fitme-api
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://fitme-ai-mvp.vercel.app
      - key: FITME_SEED_ENABLED
        value: "false"
      - key: FITME_SEED_FASHION_REFRESH
        value: "true"
      - key: FITME_SEED_PASSWORD
        value: fitme123
      - key: UPLOAD_DIR
        value: /tmp/uploads
      # Brand billing — mock=true: bấm mua cộng lượt ngay (không cần PayOS key)
      - key: PAYOS_MOCK
        value: "true"
      - key: PAYOS_RETURN_URL
        value: https://fitme-ai-mvp.vercel.app/brand/billing/return?status=success
      - key: PAYOS_CANCEL_URL
        value: https://fitme-ai-mvp.vercel.app/brand/billing/return?status=cancel
      # Khi bật PayOS thật: PAYOS_MOCK=false + set 3 key dưới trong Render dashboard (sync: false)
      - key: PAYOS_CLIENT_ID
        sync: false
      - key: PAYOS_API_KEY
        sync: false
      - key: PAYOS_CHECKSUM_KEY
        sync: false
